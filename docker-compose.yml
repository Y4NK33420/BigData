# ============================================================
#  Social Media Analytics Dashboard
#  Services: spark (FastAPI + PySpark) + frontend (React + nginx)
#  Shared volume: ./data mounted at /app/data in spark container
# ============================================================

services:

  # ── Spark / FastAPI Backend ───────────────────────────────
  spark:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: spark_analytics
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data          # Medallion data (Bronze/Silver/Gold)
      - ./data_pipeline:/app/data_pipeline
      - ./backend_api:/app/backend_api
      - ./.env:/app/.env:ro
      - ${YOUTUBE_STATIC_HOST_PATH:-./data/youtube_static}:/mnt/youtube_static:ro  # Static YT dataset (override via YOUTUBE_STATIC_HOST_PATH)
    ports:
      - "5000:5000"               # FastAPI REST API (direct access for dev)
    networks:
      - analytics_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ── React Frontend (nginx) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: react_dashboard
    ports:
      - "3000:80"                 # React app on port 3000
    networks:
      - analytics_net
    depends_on:
      spark:
        condition: service_healthy
    restart: unless-stopped

networks:
  analytics_net:
    driver: bridge
